<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>German Article Trainer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="top-gap"></div>
<div id="top-bar">
  <button id="settings-btn" title="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <div id="settings-panel">
    <div class="settings-row">
      <span class="settings-label">Show gender hints</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-gender-hints">
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>
  <div id="undo-redo">
    <button id="btn-undo" title="Undo (Ctrl+Z)" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10h11a4 4 0 0 1 0 8H7"/><polyline points="3 6 3 10 7 10"/></svg>
    </button>
    <button id="btn-redo" title="Redo (Ctrl+Y)" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10H10a4 4 0 0 0 0 8h7"/><polyline points="21 6 21 10 17 10"/></svg>
    </button>
  </div>
  <input id="search-input" type="text" placeholder="Suche nach einem Nomen… (z.B. Haus, Katze)">
  <div id="search-results"></div>
  <button id="upload-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Upload Doc
  </button>
  <input type="file" id="file-input" accept=".txt">
</div>

<div id="canvas">
  <div id="draw-ghost"></div>
  <div id="select-ghost"></div>
  <div id="sidebar">
    <div id="articles-wrap">
      <div class="sidebar-section">
        <div class="article-source" data-article="der">der</div>
        <div class="article-source" data-article="die">die</div>
        <div class="article-source" data-article="das">das</div>
        <div class="article-source" data-article="ein">ein</div>
        <div class="article-source" data-article="eine">eine</div>
      </div>
      <div class="sidebar-section">
        <div class="article-source" data-article="den">den</div>
        <div class="article-source" data-article="einen">einen</div>
      </div>
      <div class="sidebar-section">
        <div class="article-source" data-article="dem">dem</div>
        <div class="article-source" data-article="einem">einem</div>
        <div class="article-source" data-article="einer">einer</div>
      </div>
    </div>
    <div id="case-selector">
      <div class="case-btn akkusativ" id="btn-akkusativ">Akkusativ</div>
      <div class="case-btn dativ"     id="btn-dativ">Dativ</div>
    </div>
  </div>
  <div id="bin">
    <svg viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
    </svg>
  </div>
</div>

<div id="loading-overlay"><div class="spinner"></div><div class="loading-text">Scanning document for nouns…</div></div>
<div id="toast"></div>
<div id="ctx-menu">
  <div class="ctx-item" id="ctx-copy">Copy</div>
  <div class="ctx-item" id="ctx-cut">Cut</div>
  <div class="ctx-item" id="ctx-paste">Paste</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item" id="ctx-align">Align vertically</div>
</div>

<script src="script.js"></script>
</body>
</html>
